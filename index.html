<!DOCTYPE html>

<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    article { column-count: 2; column-gap: 2em; column-rule: 1px solid #e0e0e0; }
    img { max-width: 100%; height: auto; }
    p { margin: 0.6em 0; }
    h1 { margin-top: 0; }
    h2, h3 { margin-top: 1.5em; margin-bottom: 0.5em; }
    ul, ol { padding-left: 1.5em; margin: 0.5em 0; }
    .evidence-embed { transition: opacity 0.15s; }
    .evidence-embed:hover { opacity: 0.85; }
  </style>
</head>
